<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">One teacher, one transmission</title>
  <desc id="desc">Minimalist dojo illustration showing one central teacher line and two students aligned beneath, symbolizing one coherent transmission.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5efe2"/>
      <stop offset="100%" stop-color="#e8dcc6"/>
    </linearGradient>
    <linearGradient id="inkFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111111" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0.78"/>
    </linearGradient>
    <filter id="soften" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.7"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#paper)"/>

  <rect x="70" y="72" width="1060" height="486" rx="22" fill="none" stroke="#2d2d2d" stroke-opacity="0.16" stroke-width="2"/>

  <path d="M 170 470 C 290 430, 410 410, 530 410 C 640 410, 775 430, 915 472" fill="none" stroke="#111111" stroke-opacity="0.08" stroke-width="3"/>
  <path d="M 190 505 C 320 470, 450 452, 600 452 C 740 452, 870 470, 1010 508" fill="none" stroke="#111111" stroke-opacity="0.06" stroke-width="2"/>

  <g fill="#111111" opacity="0.9">
    <circle cx="600" cy="170" r="24"/>
    <path d="M 562 225 C 576 205, 624 205, 638 225 L 664 322 C 668 336, 658 348, 644 348 L 556 348 C 542 348, 532 336, 536 322 Z"/>
    <path d="M 565 350 L 548 430" stroke="#111111" stroke-width="20" stroke-linecap="round" fill="none"/>
    <path d="M 635 350 L 652 430" stroke="#111111" stroke-width="20" stroke-linecap="round" fill="none"/>
  </g>

  <g fill="#111111" opacity="0.82">
    <circle cx="410" cy="275" r="20"/>
    <path d="M 378 320 C 390 305, 430 305, 442 320 L 462 392 C 465 404, 457 414, 445 414 L 375 414 C 363 414, 355 404, 358 392 Z"/>
    <path d="M 388 414 L 374 474" stroke="#111111" stroke-width="17" stroke-linecap="round" fill="none"/>
    <path d="M 432 414 L 446 474" stroke="#111111" stroke-width="17" stroke-linecap="round" fill="none"/>
  </g>

  <g fill="#111111" opacity="0.82">
    <circle cx="790" cy="275" r="20"/>
    <path d="M 758 320 C 770 305, 810 305, 822 320 L 842 392 C 845 404, 837 414, 825 414 L 755 414 C 743 414, 735 404, 738 392 Z"/>
    <path d="M 768 414 L 754 474" stroke="#111111" stroke-width="17" stroke-linecap="round" fill="none"/>
    <path d="M 812 414 L 826 474" stroke="#111111" stroke-width="17" stroke-linecap="round" fill="none"/>
  </g>

  <path d="M 600 218 C 560 250, 520 274, 470 294" fill="none" stroke="url(#inkFade)" stroke-width="8" stroke-linecap="round" filter="url(#soften)"/>
  <path d="M 600 218 C 640 250, 680 274, 730 294" fill="none" stroke="url(#inkFade)" stroke-width="8" stroke-linecap="round" filter="url(#soften)"/>
  <path d="M 600 215 L 600 390" fill="none" stroke="#b08b3e" stroke-opacity="0.9" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 12"/>

  <text x="90" y="116" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#6d5830" letter-spacing="3">AIKIDO / BUDŌ</text>
  <text x="90" y="184" font-family="Georgia, 'Times New Roman', serif" font-size="58" fill="#111111">Jeden nauczyciel, jeden przekaz</text>
  <text x="90" y="226" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#3a3a3a">One teacher, one transmission</text>
  <text x="90" y="530" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#4b4b4b">Porządek nauki zaczyna się od jednego jasnego kierunku.</text>
</svg>
