<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Ensō brush circle</title>
  <desc id="desc">A black calligraphic circle painted in one uneven stroke on a warm paper background.</desc>
  <defs>
    <radialGradient id="paper" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#f7f1e3"/>
      <stop offset="100%" stop-color="#efe5d1"/>
    </radialGradient>
    <filter id="inkSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" />
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#paper)"/>

  <path
    d="M 225 615
       C 210 480, 275 360, 395 292
       C 540 210, 760 235, 887 360
       C 972 442, 1010 560, 980 690
       C 954 804, 870 898, 752 945
       C 630 994, 486 986, 385 926
       C 300 875, 248 800, 230 720"
    fill="none"
    stroke="#111111"
    stroke-width="78"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.95"
    filter="url(#inkSoft)"/>

  <path
    d="M 242 721
       C 248 775, 285 838, 337 884
       C 426 963, 558 1004, 692 977"
    fill="none"
    stroke="#111111"
    stroke-width="52"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"/>
</svg>
